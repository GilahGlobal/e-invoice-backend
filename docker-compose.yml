version: "3.9"

services:
  # --- DATABASE ---
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: tbl_einvoice_access
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- LOCAL REDIS ---
  redis:
  image: redis:7-alpine
  container_name: redis
  restart: unless-stopped
  ports:
    - "6379:6379"
  networks:
    - appnet
  volumes:
    - redisdata:/data
  healthcheck:
    test: ["CMD-SHELL", "redis-cli ping || exit 1"]
    interval: 10s
    timeout: 5s
    retries: 5

  # --- GO APP INSTANCES ---
  go-app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-app1
    restart: unless-stopped
    env_file:
      - ./apptest.env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
      - ./apptest.env:/app/apptest.env
    networks:
      - appnet
    depends_on:
      - postgres
      - redis

  go-app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-app2
    restart: unless-stopped
    env_file:
      - ./apptest.env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
      - ./apptest.env:/app/apptest.env
    networks:
      - appnet
    depends_on:
      - postgres
      - redis

  go-app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-app3
    restart: unless-stopped
    env_file:
      - ./apptest.env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
      - ./apptest.env:/app/apptest.env
    networks:
      - appnet
    depends_on:
      - postgres
      - redis

  # --- NGINX (Load balancer + HTTPS) ---
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt
      - ./certs-data:/data/letsencrypt
    networks:
      - appnet
    depends_on:
      - go-app1
      - go-app2
      - go-app3

  # --- CERTBOT (auto-renew certs) ---
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certs-data:/data/letsencrypt
    entrypoint: >
      /bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!};
      certbot renew --webroot -w /data/letsencrypt; done;'

  # --- PROMETHEUS ---
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - appnet

  # --- GRAFANA ---
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - appnet
      - monitoring

volumes:
  pgdata:
  redisdata:
  grafana-storage:
  certs:
  certs-data:

networks:
  appnet:
    driver: bridge
  monitoring:
    driver: bridge
